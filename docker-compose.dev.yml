services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+psycopg://dental:change-this-postgres-password@postgres:5432/dental_ai
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      UPLOAD_DIR: /app/uploaded_docs
      EXTRACTED_VISUALS_DIR: /app/uploads/extracted_visuals
    volumes:
      - ./uploaded_docs:/app/uploaded_docs
      - ./uploads:/app/uploads
      - ./knowledge_base:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - dental-network

  frontend:
    build:
      context: ./frontend
      args:
        API_PROXY_URL: http://api:8000
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_PROXY_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dental-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dental_ai
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: change-this-postgres-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental -d dental_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dental-network

  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dental-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dental-network

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

networks:
  dental-network:
    driver: bridge
